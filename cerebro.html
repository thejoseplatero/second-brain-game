/* ═══════════ ENGINE + WORLD HELPERS ═══════════ */
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const cap = document.getElementById("cap"), hud = document.getElementById("hud");
const W = cv.width, H = cv.height;
const VIO="#b44cff", ICE="#6de0ff", GOLD="#ffd75e", GREEN="#00ff88", PSY="#ff4fd8", CHROME="#d7deed";

function drawMap(map,x,y,sc,tint){
  for(let r=0;r<map.length;r++) for(let i=0;i<map[r].length;i++){
    const ch=map[r][i]; const col = tint && ch!=='.' ? tint : PALETTE[ch];
    if(col){ ctx.fillStyle=col; ctx.fillRect(x+i*sc,y+r*sc,sc,sc); }
  }
}
function walker(x,y,sc,t){ drawMap(Math.floor(t/180)%2 ? SPRITES.joseWalkA : SPRITES.joseWalkB, x, y, sc); }
function blink(x,y,sc,t){ // idle jose blinks every ~3.4s
  if((t%3400)<140){ ctx.fillStyle=PALETTE.s;
    ctx.fillRect(x+4*sc,y+3*sc,sc,sc); ctx.fillRect(x+8*sc,y+3*sc,sc,sc); }
}
function text(str,x,y,size,col,align="center",font="bold"){
  ctx.fillStyle=col; ctx.font=`${font} ${size}px 'Courier New',monospace`;
  ctx.textAlign=align; ctx.fillText(str,x,y);
}
function glow(col,blur){ ctx.shadowColor=col; ctx.shadowBlur=blur; }
function noglow(){ ctx.shadowBlur=0; }
function neon(str,x,y,size,col,align="center"){ glow(col,16); text(str,x,y,size,col,align); noglow(); }
function sign(x,y,w,h,txt,col,size,t){
  const fl = (t!==undefined && Math.floor(t/90)%41===0) ? 0.3 : 1;
  ctx.globalAlpha = fl;
  ctx.fillStyle="rgba(4,3,14,0.88)"; ctx.fillRect(x,y,w,h);
  glow(col,12); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h); noglow();
  neon(txt, x+w/2, y+h/2+(size||14)/2.8, size||14, col);
  ctx.globalAlpha = 1;
}
function box(x,y,w,h,fill,stroke){ ctx.fillStyle=fill; ctx.fillRect(x,y,w,h);
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h); } }
function bubbleC(x,y,rad,col,txt){
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fill();
  if(txt) text(txt,x,y+4,11,"#04030e");
}
function meterBar(x,y,w,pct,label){
  ctx.fillStyle="#120c2c"; ctx.fillRect(x,y,w,16);
  const col = pct>0.4 ? ICE : PSY;
  glow(col,8); ctx.fillStyle=col; ctx.fillRect(x+2,y+2,(w-4)*Math.max(0,Math.min(1,pct)),12); noglow();
  text(label, x+w/2, y-6, 11, "#7e83a6");
}
/* psychic dust: slow motes drifting upward. replaces the rain. */
function motes(t){
  for(let i=0;i<46;i++){
    const x=((i*163)+22*Math.sin(t/2400+i))%W;
    const y=H-(((i*97)+(t/22))%(H+40))+20;
    const a=0.10+0.14*Math.sin(t/700+i*1.7);
    ctx.fillStyle=`rgba(180,76,255,${Math.max(0,a)})`;
    ctx.fillRect(x,y,2,2);
  }
}
/* the cerebro chamber: concentric rings converging on a vanishing point,
   walls tiled with tiny signal lights, a walkway plunging to the console. */
function chamber(t,cx,cy){
  cx=cx??W/2; cy=cy??232;
  // rings
  for(let i=6;i>=1;i--){
    const r=i*86;
    ctx.strokeStyle=`rgba(109,224,255,${0.05+0.035*(7-i)})`;
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
  }
  // wall lights: little minds out there in the dark
  for(let i=0;i<130;i++){
    const seed=(i*2654435761)>>>0;
    const a=(seed%628)/100, rr=60+(seed>>4)%420;
    const x=cx+rr*Math.cos(a), y=cy+rr*Math.sin(a)*0.62;
    if(y>H-70) continue;
    const tw=0.25+0.55*Math.abs(Math.sin(t/900+i*2.3));
    const col = i%17===0 ? GOLD : (i%5===0 ? VIO : ICE);
    ctx.globalAlpha=tw*0.7; ctx.fillStyle=col; ctx.fillRect(x,y,2,2); ctx.globalAlpha=1;
  }
  // walkway
  ctx.fillStyle="#0a0722";
  ctx.beginPath(); ctx.moveTo(cx-190,H); ctx.lineTo(cx-26,cy+40); ctx.lineTo(cx+26,cy+40); ctx.lineTo(cx+190,H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle="rgba(180,76,255,0.55)"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx-190,H); ctx.lineTo(cx-26,cy+40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+190,H); ctx.lineTo(cx+26,cy+40); ctx.stroke();
  for(let i=1;i<5;i++){ const y=H-i*((H-cy-40)/5);
    const half=26+(190-26)*((y-cy-40)/(H-cy-40));
    ctx.strokeStyle="rgba(180,76,255,0.25)";
    ctx.beginPath(); ctx.moveTo(cx-half,y); ctx.lineTo(cx+half,y); ctx.stroke();
  }
}
/* rotating detection globe with blips */
function globe(cx,cy,r,t,blipCol){
  ctx.fillStyle="#070a1e"; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
  glow(ICE,10); ctx.strokeStyle="rgba(109,224,255,0.8)"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke(); noglow();
  ctx.strokeStyle="rgba(109,224,255,0.28)"; ctx.lineWidth=1.5;
  // latitude
  for(let i=-2;i<=2;i++){
    const yy=cy+i*r*0.36, hw=Math.sqrt(Math.max(0,r*r-(i*r*0.36)*(i*r*0.36)));
    ctx.beginPath(); ctx.ellipse(cx,yy,hw,hw*0.22,0,0,7); ctx.stroke();
  }
  // spinning longitude
  for(let i=0;i<3;i++){
    const ph=Math.sin(t/1400+i*1.05);
    ctx.beginPath(); ctx.ellipse(cx,cy,Math.abs(ph)*r,r,0,0,7); ctx.stroke();
  }
  // blips: signals surfacing around the world
  for(let i=0;i<8;i++){
    const seed=(i*40503+7)%628;
    const a=seed/100, rr=r*(0.25+((i*53)%50)/100);
    const bx=cx+rr*Math.cos(a+t/5000), by=cy+rr*Math.sin(a+t/5000)*0.8;
    const pulse=(t/1100+i*0.37)%1;
    if(pulse<0.55){
      const col=blipCol|| (i%3===0?GOLD:PSY);
      ctx.globalAlpha=1-pulse/0.55;
      glow(col,8); ctx.fillStyle=col; ctx.fillRect(bx,by,4,4); noglow();
      ctx.strokeStyle=col; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(bx+2,by+2,4+pulse*16,0,7); ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
  // sweep line
  const sa=t/900;
  ctx.strokeStyle="rgba(255,79,216,0.5)"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*Math.cos(sa),cy+r*Math.sin(sa)); ctx.stroke();
}
/* expanding psychic rings from a point */
function psyRing(cx,cy,t,col,n){
  for(let i=0;i<(n||3);i++){
    const p=((t/1600)+i/(n||3))%1;
    ctx.globalAlpha=0.5*(1-p);
    ctx.strokeStyle=col||VIO; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,8+p*120,0,7); ctx.stroke();
    ctx.globalAlpha=1;
  }
}
/* violet synthwave floor grid */
function floorGrid(t,floorY){
  ctx.strokeStyle="#221046"; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(0,floorY); ctx.lineTo(W,floorY); ctx.stroke();
  ctx.fillStyle="#070516"; ctx.fillRect(0,floorY+2,W,H-floorY);
  ctx.strokeStyle="rgba(180,76,255,0.30)"; ctx.lineWidth=1.5;
  for(let i=0;i<11;i++){
    const x=i*(W/10);
    ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(W/2+(x-W/2)*0.22,floorY+2); ctx.stroke();
  }
  const scrollv=(t/28)%40;
  for(let i=0;i<5;i++){
    const y=floorY+8+((i*40+scrollv)%(H-floorY));
    ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    ctx.globalAlpha=1;
  }
}
function clockFace(cx,cy,r,t){
  ctx.fillStyle="#0b0724"; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
  ctx.strokeStyle="#7e83a6"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
  const a=t/600;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*0.72*Math.cos(a),cy+r*0.72*Math.sin(a)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*0.45*Math.cos(a/12),cy+r*0.45*Math.sin(a/12)); ctx.stroke();
}
const qrImgs={};
for(const k in CONFIG.qrFiles){ const im=new Image(); im.src=CONFIG.qrFiles[k]; qrImgs[k]=im; }
function drawQR(key,x,y,size,url,col){
  glow(col||VIO,18); ctx.fillStyle="#f4f2ec"; ctx.fillRect(x-8,y-8,size+16,size+16); noglow();
  const im=qrImgs[key];
  if(im&&im.complete&&im.naturalWidth>0){ ctx.imageSmoothingEnabled=false; ctx.drawImage(im,x,y,size,size); }
  else{
    let seed=0; for(const c of key) seed+=c.charCodeAt(0);
    const n=13,cell=size/n;
    for(let r=0;r<n;r++)for(let c2=0;c2<n;c2++){ seed=(seed*73+17)%97;
      if(seed%2===0){ ctx.fillStyle="#04030e"; ctx.fillRect(x+c2*cell+1,y+r*cell+1,cell-2,cell-2);} }
    text("PLACEHOLDER", x+size/2, y+size/2+4, 10, VIO);
  }
  neon(url, x+size/2, y+size+30, 13, col||VIO);
}

    clockFace(60,84,16,t);
    /* the four simulations. every line is real. you have heard every line. */
    const SIMS=[
      {name:"SIM 1 · QBR", reply:"love that energy", lines:[
        ["pacing to plan!","we are not"],
        ["directionally accurate","confidently wrong"],
        ["flat is the new up","missed the number"]]},
      {name:"SIM 2 · 1:1", reply:"all good!", lines:[

        ["parking lot it","it dies in the lot"]]},
      {name:"SIM 4 · TOWNHALL", reply:"so exciting", lines:[
        ["we're a family","update your linkedin"],
        ["transformation journey","reorg"],
        ["do more with less","less means you"]]},
    ];
    const T=9000, ph=(t/T)%4, seg=Math.floor(ph), f=ph-seg;
    const podX = i => 70+i*225;
    // phases: approach → door opens → walk in → 3 exchanges → walk out → done
    const inside   = f>=0.24 && f<0.88;
    const entering = f>=0.18 && f<0.24;
    const exiting  = f>=0.88 && f<0.94;
    const doorOpen = f>=0.12 && f<0.94;
    for(let i=0;i<4;i++){
      const x=podX(i);
      const isCur = i===seg;
      const lit = isCur && f>=0.18 && f<0.94;
      box(x,150,180,270,lit?"#0c0a30":"#0a0828",lit?ICE:"#221046");
      text(SIMS[i].name,x+90,142,11,lit?ICE:"#5a5580");
      // interior floor line
      ctx.strokeStyle="rgba(109,224,255,0.25)";
      ctx.beginPath(); ctx.moveTo(x+8,408); ctx.lineTo(x+172,408); ctx.stroke();
      // airlock door at the pod base: slides up to open
      const doorH=80, dx=x+62, dy=340;
      let openQ=0;
      if(isCur){
        if(f>=0.12&&f<0.18) openQ=(f-0.12)/0.06;
        else if(doorOpen) openQ=1;
        else if(f>=0.94) openQ=Math.max(0,1-(f-0.94)/0.06);
      }
      ctx.strokeStyle=isCur&&doorOpen?GREEN:"#3a2a66"; ctx.lineWidth=2;
      ctx.strokeRect(dx,dy,56,doorH);
      if(openQ<1){
        ctx.fillStyle="#131040";
        ctx.fillRect(dx+2,dy+2+openQ*doorH,52,(1-openQ)*doorH-4>0?(1-openQ)*doorH-4:0);
        ctx.fillStyle=isCur?GREEN:"#5a5580";
        ctx.fillRect(dx+44,dy+openQ*doorH+doorH*0.45*(1-openQ),4,8);
      }
      // sim complete stamp
      if(isCur && f>=0.94) neon("SIM COMPLETE ✓",x+90,132,11,GREEN);
      if(i<seg || (seg===0&&f<0.05&&t>T)) {} // history is not rendered. it is repressed.
    }
    const x=podX(seg), cx=x+90;
    // wireframe attendees flank the inside of the active pod
    if(inside||exiting){
      ctx.globalAlpha=0.55+0.3*Math.sin(t/260);
      [[x+24],[x+138]].forEach(([ax])=>{
        ctx.strokeStyle=ICE; ctx.lineWidth=1.5;
        ctx.strokeRect(ax,360,20,46);
        ctx.beginPath(); ctx.arc(ax+10,348,8,0,7); ctx.stroke();
      });

    // the exchange: attendee buzzword → program 2 translation → jose's reply
    if(inside){
      const rf=(f-0.24)/0.64, round=Math.min(2,Math.floor(rf*3)), rq=(rf*3)%1;
      const [line,truth]=SIMS[seg].lines[round];

        ctx.beginPath(); ctx.moveTo(x+26,222); ctx.lineTo(x+30,340); ctx.lineTo(x+40,222); ctx.closePath(); ctx.fill();

        text('"'+SIMS[seg].reply+'"',cx,213,10,"#04030e");
        ctx.fillStyle="rgba(180,76,255,0.16)"; ctx.fillRect(x+6,240,168,34);
        text("program 2:",cx,254,9,VIO);
        neon("(screaming internally)",cx,268,10,PSY);
      }
    }
    // jose: approach on the room floor, step up into the sim, do the drill, step out
    if(f<0.12){
      const from = seg===0? -70 : podX(seg-1)+54, to=x+54;
      walker(from+(to-from)*(f/0.12),330,S,t);
    } else if(f<0.18){
      drawMap(SPRITES.joseIdle,x+54,330,S); blink(x+54,330,S,t);   // waiting for the airlock
    } else if(entering){
      const q=(f-0.18)/0.06;

    psyRing(150,332,t,VIO,3);
    text("(helmet on)",150,430,11,"#7e83a6");
    // notes shelf on the right: the permanent collection
    neon("notes/",790,130,13,GREEN);
    const names=["team-os","flow","loops","5-dollar"];
    names.forEach((n,i)=>{ const y=150+i*44;
      box(740,y,120,32,"#0b0724","#2a4436"); text(n,800,y+20,10,"#5aa880"); });
    /* the catch cycle: blip appears on the globe → tractor beam →
       filed into inbox → linked into the graph */
    const T=5200, p=(t%T)/T;
    const bx0=W/2-60, by0=210;
    if(p<0.30){
      // blip surfaces
      glow(GOLD,12); bubbleC(bx0,by0,11,GOLD,"!"); noglow();
      ctx.strokeStyle=GOLD; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(bx0,by0,12+(p/0.3)*18,0,7); ctx.stroke();
    } else if(p<0.55){
      // tractor beam from jose's helmet
      const q=(p-0.30)/0.25;
      const bx=bx0+(700-bx0)*q, by=by0+(160-by0)*q;
      ctx.setLineDash([5,5]); ctx.strokeStyle="rgba(180,76,255,0.6)"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(150,330); ctx.lineTo(bx,by); ctx.stroke(); ctx.setLineDash([]);
      glow(GOLD,10); bubbleC(bx,by,11,GOLD,"!"); noglow();
    } else if(p<0.68){
      neon("caught",690,140,12,GOLD);
      glow(GOLD,6); ctx.fillStyle="#f4f2ec"; ctx.fillRect(690,150,26,32); noglow();
      ctx.fillStyle="#0b0724"; ctx.fillRect(694,156,18,2); ctx.fillRect(694,162,18,2);
    } else {
      const q=(p-0.68)/0.32;
      glow(GOLD,10); box(740,326,120,32,"#241c08",GOLD); noglow();
      text("new-idea",800,346,10,GOLD);
      glow(GREEN,6); ctx.strokeStyle=GREEN; ctx.lineWidth=2;
      if(q>0.2){ ctx.beginPath(); ctx.moveTo(740,342); ctx.lineTo(700,342);
        ctx.lineTo(700,166); ctx.lineTo(740,166); ctx.stroke();
        ctx.strokeRect(740,150,120,32); }
      if(q>0.55){ ctx.beginPath(); ctx.moveTo(740,338); ctx.lineTo(688,338);
        ctx.lineTo(688,210); ctx.lineTo(740,210); ctx.stroke();
        ctx.strokeRect(740,194,120,32); }
      noglow();
      if(q>0.8) neon("linked ✓",690,300,12,GREEN);
    }
    // the receiver log, flipped from the first visit: nothing gets away
    box(76,104,232,92,"#0a0722","#22305a");
    text("RECEIVER LOG",192,126,10,"#7e83a6");
    neon("detected: 143",192,156,15,ICE);
    neon("kept: 143",192,184,17,GREEN);
    motes(t);
  }},

/* ═══════════ NAV + LOOP ═══════════ */
let idx=0, sceneStart=performance.now();
function setScene(i){ idx=Math.max(0,Math.min(SCENES.length-1,i)); sceneStart=performance.now(); renderCaption(); }
function renderCaption(){
  const s=SCENES[idx];
  cap.innerHTML=(s.title?`<span class="t">${s.world? s.world+" · ":""}${s.title}</span>`:"")+
    s.caption.map(([k,l])=>`<span class="${k}">${l}</span>`).join("");
  hud.textContent=`scene ${idx+1} / ${SCENES.length}   ·   ←→ navigate · F fullscreen`;
}
function frame(now){
  ctx.fillStyle="#04030e"; ctx.fillRect(0,0,W,H);
  SCENES[idx].render(now-sceneStart);
  // persistent version badge: v1.0 through the chaos, v2.0 from the World 3 card on
  const v2 = idx >= 8;
  text(v2 ? "v2.0" : "v1.0", W-20, 28, 12, v2 ? GREEN : "#ff4f6e", "right");
  requestAnimationFrame(frame);
}
cv.addEventListener("click",()=>setScene(idx+1));
addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" ") setScene(idx+1);
  else if(e.key==="ArrowLeft") setScene(idx-1);
  else if(e.key.toLowerCase()==="f") document.documentElement.requestFullscreen?.();
  else if(/^[1-9]$/.test(e.key)){
    const jumps={1:0,2:3,3:5,4:9,5:12,6:13,7:18}; if(jumps[e.key]!==undefined) setScene(jumps[e.key]);
  }
});
setScene(0); requestAnimationFrame(frame);
</script>
