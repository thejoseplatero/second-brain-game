<!DOCTYPE html>

<meta charset="utf-8">
<title>JOSE OS · Second Brain: The Game</title>
<!--
  ═══════════════════════════════════════════════════════════════
  SECOND BRAIN · neon-noir pixel version of the talk game (CANONICAL)
  Rain, neon, wet streets. The Last Night / Katana ZERO energy.
  ═══════════════════════════════════════════════════════════════
  HOW TO TWEAK:
    1. CONFIG  · URLs, names. Right below.
    2. SCENES  · every caption string. Search "const SCENES".
    3. SPRITES · pixel maps, edit like ASCII art. Legend in PALETTE.
  CONTROLS: click / space / → next. ← back. F fullscreen. 1-7 world jumps.
  QR PNGs: qr-starter.png, qr-substack.png, qr-linkedin.png (same folder).
  ═══════════════════════════════════════════════════════════════
-->
<style>
  :root{ --bg:#05030c; --ink:#e8e6f2; --dim:#7d7a99; --pink:#ff2e88; --cyan:#00e5ff; --gold:#ffd75e; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Courier New',monospace;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       min-height:100vh;gap:14px;padding:20px;user-select:none}
  canvas{image-rendering:pixelated;border:3px solid #1c1030;border-radius:4px;
         box-shadow:0 0 24px rgba(255,46,136,0.25), 0 0 60px rgba(0,229,255,0.12);
         max-width:92vw;height:auto;cursor:pointer}
  #cap{max-width:900px;width:92vw;min-height:96px;text-align:center;line-height:1.55}
  #cap .t{color:var(--pink);font-weight:bold;letter-spacing:.12em;font-size:13px;
          text-transform:uppercase;display:block;margin-bottom:8px}
  #cap .l{font-size:16px;display:block;margin:3px 0}
  #cap .q{font-size:16px;display:block;margin:6px 0;color:var(--cyan);font-style:italic}
  #hud{color:var(--dim);font-size:12px;letter-spacing:.08em}
</style>
</head>
<body>
<canvas id="cv" width="960" height="540"></canvas>
<div id="cap"></div>
<div id="hud"></div>

<script>
/* ═══════════ CONFIG ═══════════ */

/* ═══════════ PALETTE + SPRITES ═══════════ */
const PALETTE = {

  g:"#ffd75e", r:"#ff4f6e", m:"#00ff41",
  t:"#8a5a2c", T:"#e8c47a", // toast crust + bread

const SPRITES = {

/* ═══════════ ENGINE + WORLD HELPERS ═══════════ */
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const cap = document.getElementById("cap"), hud = document.getElementById("hud");
const W = cv.width, H = cv.height;
const PINK="#ff2e88", CYAN="#00e5ff", GOLD="#ffd75e", GREEN="#00ff88", MATRIX="#00ff41";

function drawMap(map,x,y,sc,tint){
  for(let r=0;r<map.length;r++) for(let i=0;i<map[r].length;i++){
    const ch=map[r][i]; const col = tint && ch!=='.' ? tint : PALETTE[ch];
    if(col){ ctx.fillStyle=col; ctx.fillRect(x+i*sc,y+r*sc,sc,sc); }
  }
}
function walker(x,y,sc,t){ drawMap(Math.floor(t/180)%2 ? SPRITES.joseWalkA : SPRITES.joseWalkB, x, y, sc); }
function blink(x,y,sc,t){ // idle jose blinks every ~3.4s
  if((t%3400)<140){ ctx.fillStyle=PALETTE.s;
    ctx.fillRect(x+4*sc,y+3*sc,sc,sc); ctx.fillRect(x+8*sc,y+3*sc,sc,sc); }
}
function text(str,x,y,size,col,align="center",font="bold"){
  ctx.fillStyle=col; ctx.font=`${font} ${size}px 'Courier New',monospace`;
  ctx.textAlign=align; ctx.fillText(str,x,y);
}
function glow(col,blur){ ctx.shadowColor=col; ctx.shadowBlur=blur; }
function noglow(){ ctx.shadowBlur=0; }
function neon(str,x,y,size,col,align="center"){ glow(col,16); text(str,x,y,size,col,align); noglow(); }
function sign(x,y,w,h,txt,col,size,t){
  const fl = (t!==undefined && Math.floor(t/90)%41===0) ? 0.3 : 1;
  ctx.globalAlpha = fl;
  ctx.fillStyle="rgba(5,3,12,0.88)"; ctx.fillRect(x,y,w,h);
  glow(col,12); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h); noglow();
  neon(txt, x+w/2, y+h/2+(size||14)/2.8, size||14, col);
  ctx.globalAlpha = 1;
}
function box(x,y,w,h,fill,stroke){ ctx.fillStyle=fill; ctx.fillRect(x,y,w,h);
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h); } }
function bubbleC(x,y,rad,col,txt){
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fill();
  if(txt) text(txt,x,y+4,11,"#05030c");
}
function meterBar(x,y,w,pct,label){
  ctx.fillStyle="#160c26"; ctx.fillRect(x,y,w,16);
  const col = pct>0.4 ? CYAN : PINK;
  glow(col,8); ctx.fillStyle=col; ctx.fillRect(x+2,y+2,(w-4)*Math.max(0,Math.min(1,pct)),12); noglow();
  text(label, x+w/2, y-6, 11, "#7d7a99");
}
function skyline(t,floorY,scroll){
  const layers=[{c:"#0a0618",per:210,hmin:130,winA:0.45,speed:1},
                {c:"#140b2a",per:150,hmin:70, winA:0.85,speed:1.9}];
  layers.forEach((L,li)=>{
    const off = scroll ? (t*scroll*L.speed)%L.per : 0;
    for(let i=-1;i<9;i++){
      const seed=(i*73+li*31)&255;
      const bw = L.per-26-(seed%36);
      const hgt = L.hmin+((seed*97)%110);
      const x = i*L.per-off, y = floorY-hgt;
      ctx.fillStyle=L.c; ctx.fillRect(x,y,bw,hgt);
      if(seed%3===0){ ctx.fillStyle=L.c; ctx.fillRect(x+bw/2-2,y-24,4,24);
        if(Math.floor(t/650+i)%2===0){ glow("#ff4455",6); ctx.fillStyle="#ff4455";
          ctx.fillRect(x+bw/2-3,y-29,6,5); noglow(); } }
      if(seed%4===1){ ctx.fillStyle=L.c; ctx.fillRect(x+8,y-11,20,11); }
      if(seed%5===2){ ctx.fillStyle=L.c; ctx.fillRect(x+bw-26,y-8,16,8); }
      const rows=Math.floor((hgt-14)/16), cols=Math.floor((bw-10)/14);
      for(let r=0;r<rows;r++) for(let c2=0;c2<cols;c2++){
        const wx=x+6+c2*14, wy=y+8+r*16;
        if(((seed+r*7+c2*13)%9)<3){
          ctx.fillStyle=[PINK,CYAN,GOLD,"#e8e6f2"][(r+c2+seed)%4];
          ctx.globalAlpha=0.55*L.winA; ctx.fillRect(wx,wy,8,10); ctx.globalAlpha=1;
        } else { ctx.fillStyle="rgba(255,255,255,0.04)"; ctx.fillRect(wx,wy,8,10); }
      }
    }
  });
}
function rain(t){
  ctx.strokeStyle="rgba(140,180,255,0.20)"; ctx.lineWidth=1.5;
  for(let i=0;i<70;i++){
    const x=((i*137)+(t/2.2))%(W+100)-50, y=((i*211)+(t/1.1))%H;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-8,y+18); ctx.stroke();
  }
}
function wet(y,h){
  const g=ctx.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,"rgba(255,46,136,0.12)"); g.addColorStop(0.5,"rgba(0,229,255,0.07)"); g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g; ctx.fillRect(0,y,W,h);
}
function steam(x,baseY,t,seedO){
  for(let i=0;i<4;i++){
    const p=((t/1800)+i*0.25+(seedO||0))%1;
    const r=6+p*16, yy=baseY-p*70, a=0.15*(1-p);
    ctx.fillStyle=`rgba(200,210,230,${a})`;
    ctx.beginPath(); ctx.arc(x+6*Math.sin(p*6+i),yy,r,0,7); ctx.fill();
  }
}
function car(t,y,dir,speed,offset){
  let x=((t*(speed||0.35)+(offset||0))%(W+280))-140;
  if(dir<0) x = W-x;
  ctx.fillStyle="#181028"; ctx.fillRect(x,y-18,84,16);
  ctx.fillStyle="#241436"; ctx.fillRect(x+16,y-28,44,12);
  ctx.fillStyle="#0e1830"; ctx.fillRect(x+20,y-25,16,8); ctx.fillRect(x+40,y-25,16,8);
  glow(GOLD,8); ctx.fillStyle=GOLD; ctx.fillRect(dir<0?x:x+80,y-13,6,5); noglow();
  glow(PINK,8); ctx.fillStyle=PINK; ctx.fillRect(dir<0?x+80:x,y-13,4,5); noglow();
  ctx.fillStyle="#0a0714"; ctx.beginPath(); ctx.arc(x+18,y,7,0,7); ctx.arc(x+66,y,7,0,7); ctx.fill();
}
function street(t,floorY,scroll){
  skyline(t,floorY,scroll);
  ctx.strokeStyle="#241436"; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(0,floorY); ctx.lineTo(W,floorY); ctx.stroke();
  ctx.fillStyle="#0a0714"; ctx.fillRect(0,floorY+2,W,H-floorY);
  wet(floorY+2, Math.min(90,H-floorY));
}
function clockFace(cx,cy,r,t){
  ctx.fillStyle="#0d0820"; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
  ctx.strokeStyle="#7d7a99"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
  const a=t/600;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*0.72*Math.cos(a),cy+r*0.72*Math.sin(a)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*0.45*Math.cos(a/12),cy+r*0.45*Math.sin(a/12)); ctx.stroke();
}
const qrImgs={};
for(const k in CONFIG.qrFiles){ const im=new Image(); im.src=CONFIG.qrFiles[k]; qrImgs[k]=im; }
function drawQR(key,x,y,size,url,col){
  glow(col||PINK,18); ctx.fillStyle="#f4f2ec"; ctx.fillRect(x-8,y-8,size+16,size+16); noglow();
  const im=qrImgs[key];
  if(im&&im.complete&&im.naturalWidth>0){ ctx.imageSmoothingEnabled=false; ctx.drawImage(im,x,y,size,size); }
  else{
    let seed=0; for(const c of key) seed+=c.charCodeAt(0);
    const n=13,cell=size/n;
    for(let r=0;r<n;r++)for(let c2=0;c2<n;c2++){ seed=(seed*73+17)%97;
      if(seed%2===0){ ctx.fillStyle="#05030c"; ctx.fillRect(x+c2*cell+1,y+r*cell+1,cell-2,cell-2);} }
    text("PLACEHOLDER", x+size/2, y+size/2+4, 10, PINK);
  }
  neon(url, x+size/2, y+size+30, 13, col||PINK);
}

/* ═══════════ SCENES ═══════════ */
const S = 6;
const SCENES = [

/* 0 · COLD OPEN · THE DIAGNOSTIC */
{ world:"BOOT", title:"Jose's Brain Is Toast",
  caption:[
    ["q","“Quick diagnostic before we start.”"],
    ["l","This is a true story."]],
  render(t){
    // CRT boot screen
    ctx.fillStyle="rgba(255,255,255,0.02)";
    for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);
    text("JOSE OS · BOOT DIAGNOSTIC · v44",W/2,60,14,"#7d7a99");
    // the patient: a worried piece of toast
    drawMap(SPRITES.toast, 160, 170, 14);
    steam(216,170,t,0); steam(256,165,t,0.4);
    // terminal runs the checks
    box(430,110,470,290,"#0a0d18","#2a3a58");
    text("> running checks...",450,142,13,"#5aa880","left");
    const checks=[
      ["memory ..............","FULL","#ff4f6e"],
      ["open loops ..........","100+","#ffd75e"],
      ["shower ideas kept ...","0%","#ff4f6e"],
      ["hyperfocus ..........","ARMED","#00ff88"],
      ["calendar ............","uninstalled by user","#7d7a99"],
      ["next month ..........","NOT FOUND","#ff4f6e"],
    ];
    checks.forEach((c2,i)=>{ if(t>500+i*430){
      text("> "+c2[0],450,178+i*30,13,"#8aa4c8","left");
      text(c2[1],700,178+i*30,13,c2[2],"left"); }});
    if(t>500+6*430) neon("DIAGNOSIS: TOAST.",665,384,15,PINK);
    if(t>3600) neon("JOSE'S BRAIN IS TOAST",W/2,468,40,GOLD);
    if(t>4400 && Math.floor(t/500)%2===0)
      text("...or is it? press start to debug",W/2,508,14,"#7d7a99");
  }},

/* 1 · TITLE */
{ world:"START", title:"JOSE OS",
  caption:[["q","A mostly true story about the world inside my head."],["l","PRESS START"]],
  render(t){
    street(t,410,0);
    car(t,436,1,0.30,0);
    sign(70,90,150,50,"OPEN 24HRS",CYAN,14,t);
    sign(750,130,150,46,"IDEAS",PINK,16,t);
    steam(320,410,t,0); steam(700,410,t,0.5);
    // title pulses like a neon sign warming up
    ctx.globalAlpha = 0.8+0.2*Math.sin(t/420);
    neon("JOSE OS", W/2, 212, 64, PINK);
    ctx.globalAlpha = 1;
    neon("SECOND BRAIN · THE GAME", W/2, 260, 20, CYAN);
    drawMap(SPRITES.joseIdle, W/2-36, 306, S);
    blink(W/2-36, 306, S, t);
    if(Math.floor(t/500)%2===0) neon("PRESS START", W/2, 490, 20, GREEN);
    text("a talk by "+CONFIG.speaker, W/2, 520, 13, "#7d7a99");
    rain(t);
  }},

/* 1 · THE HUNDRED PLACES */
{ world:"WORLD 1", title:"The Hundred Places",
  caption:[
    ["q","“How many of you have had a great idea in the shower and lost it by noon?”"],
    ["l","My mind is in a hundred different places all the time."],
    ["l","That's not a metaphor. That's just how it is in here."]],
  render(t){
    box(80,60,800,380,"#0d0820","#2a1a44");
    sign(110,80,170,44,"IDEA FACTORY",PINK,13,t);
    // window with living city
    box(700,90,150,150,"#05030c","#2a1a44");
    ctx.save(); ctx.beginPath(); ctx.rect(700,90,150,150); ctx.clip();
    skyline(t,240,0);
    ctx.strokeStyle="rgba(140,180,255,0.25)";
    for(let i=0;i<12;i++){ const x=700+((i*29)+(t/3))%150, y=90+((i*47)+t/1.4)%150;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-4,y+9); ctx.stroke(); }
    ctx.restore();
    ctx.strokeStyle="#2a1a44"; ctx.strokeRect(700,90,150,150);
    // TODO INVADERS: an arcade cabinet where the todos always win
    ctx.fillStyle="#160c26"; ctx.fillRect(140,255,150,185);
    glow(PINK,10); ctx.strokeStyle=PINK; ctx.lineWidth=2;
    ctx.strokeRect(140,255,150,185); noglow();
    // marquee
    ctx.fillStyle="#0d0820"; ctx.fillRect(146,261,138,26);
    neon("TODO INVADERS",215,280,12,GOLD);
    // screen
    ctx.fillStyle="#05030c"; ctx.fillRect(155,292,120,90);
    ctx.strokeStyle="#2a1a44"; ctx.lineWidth=2; ctx.strokeRect(155,292,120,90);
    ctx.save(); ctx.beginPath(); ctx.rect(155,292,120,90); ctx.clip();
    // the score is the todo count. firing does not help.
    text("TODO: "+(99+Math.floor(t/250)),215,304,9,GOLD);
    // invader waves march, descend, never stop coming
    const mo=6*Math.sin(t/600), dsc=(t/500)%16, legOut=Math.floor(t/400)%2;
    for(let r=0;r<3;r++) for(let c2=0;c2<4;c2++){
      const ix=163+c2*28+mo, iy=310+r*16+dsc;
      ctx.fillStyle="#7ee787";
      ctx.fillRect(ix,iy,10,4);
      ctx.fillRect(ix+2,iy-2,6,2);
      if(legOut){ ctx.fillRect(ix-2,iy+4,2,2); ctx.fillRect(ix+10,iy+4,2,2); }
      else { ctx.fillRect(ix+2,iy+4,2,2); ctx.fillRect(ix+6,iy+4,2,2); }
      ctx.fillStyle="#05030c"; ctx.fillRect(ix+2,iy+1,2,2); ctx.fillRect(ix+6,iy+1,2,2);
    }
    // tiny jose-ship strafes and fires nonstop
    const shx=205+34*Math.sin(t/450);
    ctx.fillStyle=CYAN; ctx.fillRect(shx,372,12,4); ctx.fillRect(shx+4,368,4,4);
    [185,215,245].forEach((lane,b3)=>{
      const bp2=((t/300)+b3*0.33)%1;
      ctx.fillStyle=GOLD; ctx.fillRect(lane,368-bp2*56,2,6);
      if(bp2>0.86){ ctx.fillStyle="#ff9a4a";
        ctx.fillRect(lane-3,308,2,2); ctx.fillRect(lane+3,308,2,2);
        ctx.fillRect(lane,304,2,2); ctx.fillRect(lane,312,2,2); }
    });
    ctx.restore();
    // control panel: joystick + two buttons
    ctx.fillStyle="#2a1a44"; ctx.fillRect(148,388,134,18);
    ctx.strokeStyle="#3d2a5e"; ctx.strokeRect(148,388,134,18);
    ctx.fillStyle="#7d7a99"; ctx.fillRect(176,380,4,10);
    ctx.fillStyle="#f4f2ec"; ctx.beginPath(); ctx.arc(178,378,5,0,7); ctx.fill();
    ctx.fillStyle="#ff4f6e"; ctx.beginPath(); ctx.arc(226,397,5,0,7); ctx.fill();
    ctx.fillStyle="#ffd75e"; ctx.beginPath(); ctx.arc(248,397,5,0,7); ctx.fill();
    // cabinet base
    ctx.fillStyle="#0d0820"; ctx.fillRect(146,406,138,34);
    drawMap(SPRITES.joseIdle, W/2-36, 340, S);
    blink(W/2-36, 340, S, t);
    // thought bubbles about actual things, not just circles
    const topics=["ux","$","ai","","?","team","","ship",""];
    for(let i=0;i<9;i++){
      const bx=150+((i*97)%660), phase=(t/900+i*0.7);
      const by=140+40*Math.sin(phase)+(i%3)*50;
      const col = i===4 ? GOLD : "#3d2a5e";
      if(i===4) glow(GOLD,10);
      bubbleC(bx,by,16+(i%3)*5,col); noglow();
      if(topics[i] && i!==4) text(topics[i],bx,by+4,10,"#7d7a99");
    }
    // the golden one escapes and pops with a burst
    const gx=480+(t/12)%520;
    if(gx<940){ glow(GOLD,12); bubbleC(gx,105,22,GOLD,"!"); noglow(); }
    else{
      neon("POP",900,110,16,PINK);
      ctx.strokeStyle=GOLD; ctx.lineWidth=2;
      for(let i=0;i<4;i++){ const a=i*1.57+0.78;
        ctx.beginPath(); ctx.moveTo(900+10*Math.cos(a),105+10*Math.sin(a));
        ctx.lineTo(900+18*Math.cos(a),105+18*Math.sin(a)); ctx.stroke(); }
    }
  }},

/* 2 · THE PARADOX */
{ world:"WORLD 1", title:"The Paradox",

/* ═══════════ NAV + LOOP ═══════════ */
let idx=0, sceneStart=performance.now();
function setScene(i){ idx=Math.max(0,Math.min(SCENES.length-1,i)); sceneStart=performance.now(); renderCaption(); }
function renderCaption(){
  const s=SCENES[idx];
  cap.innerHTML=(s.title?`<span class="t">${s.world? s.world+" · ":""}${s.title}</span>`:"")+
    s.caption.map(([k,l])=>`<span class="${k}">${l}</span>`).join("");
  hud.textContent=`scene ${idx+1} / ${SCENES.length}   ·   ←→ navigate · F fullscreen`;
}
function frame(now){
  ctx.fillStyle="#05030c"; ctx.fillRect(0,0,W,H);
  SCENES[idx].render(now-sceneStart);
  requestAnimationFrame(frame);
}
cv.addEventListener("click",()=>setScene(idx+1));
addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" ") setScene(idx+1);
  else if(e.key==="ArrowLeft") setScene(idx-1);
  else if(e.key.toLowerCase()==="f") document.documentElement.requestFullscreen?.();
  else if(/^[1-9]$/.test(e.key)){
    const jumps={1:0,2:2,3:4,4:8,5:11,6:12,7:17}; if(jumps[e.key]!==undefined) setScene(jumps[e.key]);
  }
});
setScene(0); requestAnimationFrame(frame);
</script>
